<VirtualHost *:80>
    ServerName crew.ninjasage.id
    Redirect permanent / https://crew.ninjasage.id/
</VirtualHost>

<VirtualHost *:443>
    ServerName crew.ninjasage.id
    DocumentRoot "C:/laragon/www/ninjasage/public"

    SSLEngine on
    SSLCertificateFile    "C:/laragon/etc/ssl/crew.ninjasage.id.pem"
    SSLCertificateKeyFile "C:/laragon/etc/ssl/crew.ninjasage.id-key.pem"

    <Directory "C:/laragon/www/ninjasage/public">
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    ErrorLog  "C:/laragon/www/ninjasage/logs/crew-error.log"
    CustomLog "C:/laragon/www/ninjasage/logs/crew-access.log" combined
</VirtualHost>
