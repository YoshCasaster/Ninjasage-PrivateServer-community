<VirtualHost *:80>
    DocumentRoot "C:/laragon/www/ninjasage/public"
    ServerName clan.ninjasage.id
    <Directory "C:/laragon/www/ninjasage/public">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:443>
    DocumentRoot "C:/laragon/www/ninjasage/public"
    ServerName clan.ninjasage.id
    SSLEngine on
    SSLCertificateFile "C:/laragon/etc/ssl/clan.ninjasage.id.pem"
    SSLCertificateKeyFile "C:/laragon/etc/ssl/clan.ninjasage.id-key.pem"
    <Directory "C:/laragon/www/ninjasage/public">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
